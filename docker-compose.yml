version: '3.9'
services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'YourStrong!Passw0rd'
    ports:
      - '1433:1433'
    volumes:
      - cms_sql_data:/var/opt/mssql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: 'Production'
      ConnectionStrings__DefaultConnection: 'Server=sql;Database=OIC_CMS;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;'
      Jwt__Issuer: 'OIC-CMS'
      Jwt__Audience: 'OIC-CMS'
      Jwt__SigningKey: 'CHANGE_ME__PLEASE_USE_A_64+_CHAR_RANDOM_SECRET'
      Storage__BasePath: '/storage'
      Smtp__Enabled: 'false'
    ports:
      - '8080:8080'
    depends_on:
      - sql
    volumes:
      - cms_storage:/storage
      - cms_logs:/app/logs

  web:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  cms_sql_data:
  cms_storage:
  cms_logs:
